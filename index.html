<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Merge on Shake</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000814; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="myCanvas"></canvas>

    <script>
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function Particle(x, y, radius, color, dx, dy) {
            this.x = x; this.y = y; this.radius = radius;
            this.color = color; this.dx = dx; this.dy = dy;
            this.alpha = 1;

            this.update = function(dt) {
                this.x += this.dx * dt;
                this.y += this.dy * dt;
                this.alpha -= 0.8 * dt;
                if (this.alpha > 0) {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.restore();
                }
            };
        }

        function Circle(x, y, radius, dx, dy, color) {
            this.x = x;
            this.y = y;
            this.radius = radius;
            this.dx = dx;
            this.dy = dy;
            this.color = color;
            this.isMerging = false; // Trạng thái tụ lại

            this.draw = function() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            };

            this.update = function(dt) {
                if (this.isMerging) {
                    // Di chuyển về tâm màn hình
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    const angle = Math.atan2(centerY - this.y, centerX - this.x);
                    const speed = 400; 
                    
                    this.x += Math.cos(angle) * speed * dt;
                    this.y += Math.sin(angle) * speed * dt;

                    // Kiểm tra va chạm để hợp nhất
                    for (let i = 0; i < circleArray.length; i++) {
                        let other = circleArray[i];
                        if (this === other) continue;

                        let dist = Math.hypot(this.x - other.x, this.y - other.y);
                        if (dist < this.radius + other.radius) {
                            // Hợp nhất diện tích: R_mới = sqrt(R1^2 + R2^2)
                            this.radius = Math.sqrt(Math.pow(this.radius, 2) + Math.pow(other.radius, 2));
                            circleArray.splice(i, 1);
                            break;
                        }
                    }
                } else {
                    // Di chuyển bình thường
                    if (this.x + this.radius > canvas.width || this.x - this.radius < 0) this.dx = -this.dx;
                    if (this.y + this.radius > canvas.height || this.y - this.radius < 0) this.dy = -this.dy;
                    this.x += this.dx * dt;
                    this.y += this.dy * dt;
                }
                this.draw();
            };

            this.burst = function() {
                for (let i = 0; i < 15; i++) {
                    particleArray.push(new Particle(this.x, this.y, Math.random() * 4 + 1, this.color, (Math.random() - 0.5) * 500, (Math.random() - 0.5) * 500));
                }
            };
        }

        let circleArray = [];
        let particleArray = [];

        function initCircles() {
            circleArray = [];
            for (let i = 0; i < 35; i++) {
                let radius = Math.random() * 20 + 10;
                let x = Math.random() * (canvas.width - radius * 2) + radius;
                let y = Math.random() * (canvas.height - radius * 2) + radius;
                let dx = (Math.random() - 0.5) * 150;
                let dy = (Math.random() - 0.5) * 150;
                let blue = Math.floor(Math.random() * 56) + 200;
                let green = Math.floor(Math.random() * (blue - 50));
                let color = `rgb(0, ${green}, ${blue})`;
                circleArray.push(new Circle(x, y, radius, dx, dy, color));
            }
        }

        let lastTime = 0;
        function animate(currentTime) {
            requestAnimationFrame(animate);
            let dt = (currentTime - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1;
            lastTime = currentTime;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            circleArray.forEach(c => c.update(dt));
            particleArray = particleArray.filter(p => p.alpha > 0);
            particleArray.forEach(p => p.update(dt));

            // Nếu chỉ còn 1 bong bóng duy nhất và đang ở tâm, có thể cho nó trôi lại bình thường
            if (circleArray.length === 1 && circleArray[0].isMerging) {
                const c = circleArray[0];
                if (Math.hypot(canvas.width/2 - c.x, canvas.height/2 - c.y) < 5) {
                    c.isMerging = false;
                }
            }
        }

        initCircles();
        requestAnimationFrame(animate);

        function handlePress(clientX, clientY) {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().catch(console.error);
            }
            // Nếu click vào "siêu bong bóng" cuối cùng, hồi sinh lại tất cả
            if (circleArray.length === 1) {
                let c = circleArray[0];
                if (Math.hypot(clientX - c.x, clientY - c.y) < c.radius) {
                    c.burst();
                    circleArray = [];
                    setTimeout(initCircles, 500);
                    return;
                }
            }

            for (let i = circleArray.length - 1; i >= 0; i--) {
                let c = circleArray[i];
                if (Math.hypot(clientX - c.x, clientY - c.y) < c.radius) {
                    c.burst();
                    circleArray.splice(i, 1);
                    break; 
                }
            }
        }

        window.addEventListener('mousedown', e => handlePress(e.clientX, e.clientY));
        window.addEventListener('touchstart', e => handlePress(e.touches[0].clientX, e.touches[0].clientY));

        let lastX = 0;
        window.addEventListener('devicemotion', (e) => {
            let acc = e.accelerationIncludingGravity;
            if (!acc) return;
            if (Math.abs(acc.x - lastX) > 15) {
                circleArray.forEach(c => c.isMerging = true);
            }
            lastX = acc.x;
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initCircles();
        });
    </script>
</body>
</html>
