<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iPhone Shake Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000814; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        /* Nút cấp quyền dành cho iPhone */
        #btnPermission {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 18px;
            background: #00b4d8;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.5);
        }
    </style>
</head>
<body>
    <button id="btnPermission">Nhấn để bật cảm biến lắc (iPhone)</button>
    <canvas id="myCanvas"></canvas>

    <script>
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");
        const btn = document.getElementById("btnPermission");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- CODE LOGIC BONG BÓNG ---
        function Particle(x, y, radius, color, dx, dy) {
            this.x = x; this.y = y; this.radius = radius;
            this.color = color; this.dx = dx; this.dy = dy;
            this.alpha = 1;
            this.update = function(dt) {
                this.x += this.dx * dt;
                this.y += this.dy * dt;
                this.alpha -= 0.8 * dt;
                if (this.alpha > 0) {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.restore();
                }
            };
        }

        function Circle(x, y, radius, dx, dy, color) {
            this.x = x; this.y = y; this.radius = radius;
            this.dx = dx; this.dy = dy; this.color = color;
            this.isMerging = false;

            this.draw = function() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            };

            this.update = function(dt) {
                if (this.isMerging) {
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    const angle = Math.atan2(centerY - this.y, centerX - this.x);
                    const speed = 500;
                    this.x += Math.cos(angle) * speed * dt;
                    this.y += Math.sin(angle) * speed * dt;

                    for (let i = 0; i < circleArray.length; i++) {
                        let other = circleArray[i];
                        if (this === other) continue;
                        let dist = Math.hypot(this.x - other.x, this.y - other.y);
                        if (dist < this.radius + other.radius) {
                            this.radius = Math.sqrt(Math.pow(this.radius, 2) + Math.pow(other.radius, 2));
                            circleArray.splice(i, 1);
                            break;
                        }
                    }
                } else {
                    if (this.x + this.radius > canvas.width || this.x - this.radius < 0) this.dx = -this.dx;
                    if (this.y + this.radius > canvas.height || this.y - this.radius < 0) this.dy = -this.dy;
                    this.x += this.dx * dt;
                    this.y += this.dy * dt;
                }
                this.draw();
            };

            this.burst = function() {
                for (let i = 0; i < 15; i++) {
                    particleArray.push(new Particle(this.x, this.y, Math.random()*3+1, this.color, (Math.random()-0.5)*500, (Math.random()-0.5)*500));
                }
            };
        }

        let circleArray = [];
        let particleArray = [];

        function initCircles() {
            circleArray = [];
            for (let i = 0; i < 30; i++) {
                let r = Math.random() * 20 + 10;
                circleArray.push(new Circle(Math.random()*canvas.width, Math.random()*canvas.height, r, (Math.random()-0.5)*150, (Math.random()-0.5)*150, `rgb(0, ${Math.random()*200+55}, 255)`));
            }
        }

        let lastTime = 0;
        function animate(currentTime) {
            requestAnimationFrame(animate);
            let dt = (currentTime - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1;
            lastTime = currentTime;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            circleArray.forEach(c => c.update(dt));
            particleArray = particleArray.filter(p => p.alpha > 0);
            particleArray.forEach(p => p.update(dt));
        }

        // --- XỬ LÝ QUYỀN TRÊN IPHONE (QUAN TRỌNG NHẤT) ---
        btn.addEventListener('click', function() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                // Đây là yêu cầu bắt buộc của iOS
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', handleShake);
                            btn.style.display = 'none'; // Ẩn nút sau khi đã cấp quyền
                        } else {
                            alert("Bạn đã từ chối quyền truy cập cảm biến.");
                        }
                    })
                    .catch(console.error);
            } else {
                // Đối với Android hoặc trình duyệt không cần xin quyền
                window.addEventListener('devicemotion', handleShake);
                btn.style.display = 'none';
            }
        });

        let lastX = 0;
        function handleShake(e) {
            let acc = e.accelerationIncludingGravity;
            if (!acc) return;
            let change = Math.abs(acc.x - lastX);
            if (change > 15) { // Ngưỡng lắc
                circleArray.forEach(c => c.isMerging = true);
            }
            lastX = acc.x;
        }

        // Chạm để vỡ hoặc hồi sinh
        window.addEventListener('touchstart', e => {
            let touch = e.touches[0];
            if (circleArray.length === 1) {
                let c = circleArray[0];
                if (Math.hypot(touch.clientX - c.x, touch.clientY - c.y) < c.radius) {
                    c.burst();
                    circleArray = [];
                    setTimeout(initCircles, 500);
                }
            }
            for (let i = circleArray.length - 1; i >= 0; i--) {
                let c = circleArray[i];
                if (Math.hypot(touch.clientX - c.x, touch.clientY - c.y) < c.radius) {
                    c.burst();
                    circleArray.splice(i, 1);
                    break;
                }
            }
        });

        initCircles();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
